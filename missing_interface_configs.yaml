# 为缺失的接口创建YAML配置

## 2.27 bak_basic.yaml - 备用基础数据

```yaml
name: bak_basic
api_name: bak_basic
description: "备用基础数据"

permissions:
  min_points: 5000
  rate_limit: 60
  query_limit: 5000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters: {}

pagination:
  enabled: false

output:
  primary_key: ["ts_code"]
  columns:
    ts_code: {type: string, required: true}
    trade_date: {type: date, format: "%Y%m%d", required: true}
    name: {type: string}
    industry: {type: string}
    area: {type: string}
    pe: {type: float}
    float_share: {type: float}
    total_share: {type: float}
    total_assets: {type: float}
    liquid_assets: {type: float}
    fixed_assets: {type: float}
    reserved: {type: float}
    reserved_pershare: {type: float}
    eps: {type: float}
    bvps: {type: float}
    pb: {type: float}
    list_date: {type: date, format: "%Y%m%d"}
```

## 2.28 stock_st.yaml - ST股票列表

```yaml
name: stock_st
api_name: stock_st
description: "ST股票列表"

permissions:
  min_points: 3000
  rate_limit: 60
  query_limit: 5000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  trade_date:
    type: string
    required: false
    default: "20231201"
    description: "交易日期 YYYYMMDD"

pagination:
  enabled: false

output:
  primary_key: ["ts_code", "trade_date"]
  sort_by: ["ts_code"]
  columns:
    ts_code: {type: string, required: true}
    trade_date: {type: date, format: "%Y%m%d", required: true}
    name: {type: string}
    in_date: {type: date, format: "%Y%m%d"}
    out_date: {type: date, format: "%Y%m%d"}
    reason: {type: string}
```

## 2.29 stk_holdertrade.yaml - 股东增减持

```yaml
name: stk_holdertrade
api_name: stk_holdertrade
description: "股东增减持"

permissions:
  min_points: 5000
  rate_limit: 60
  query_limit: 5000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  start_date:
    type: string
    required: false
    default: "20230101"
    description: "开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    default: "20231231"
    description: "结束日期 YYYYMMDD"

pagination:
  enabled: true
  mode: "date_range"
  window_size_days: 365

output:
  primary_key: ["ts_code", "ann_date", "holder_name"]
  sort_by: ["ann_date"]
  columns:
    ts_code: {type: string, required: true}
    ann_date: {type: date, format: "%Y%m%d", required: true}
    holder_name: {type: string, required: true}
    holder_type: {type: string}
    in_de: {type: string}
    change_vol: {type: float}
    change_ratio: {type: float}
    after_share: {type: float}
    after_ratio: {type: float}
    avg_price: {type: float}
    total_share: {type: float}
```


## 2.33 fina_mainbz.yaml - 主营业务构成

```yaml
name: fina_mainbz
api_name: fina_mainbz
description: "主营业务构成"

permissions:
  min_points: 2000
  rate_limit: 60
  query_limit: 5000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  period:
    type: string
    required: false
    default: "20231231"
    description: "报告期 YYYYMMDD"
  ts_code:
    type: string
    required: false
    description: "证券代码"
  type:
    type: string
    required: false
    default: "P"
    options: ["P", "B"]
    description: "类型：P按产品，B按地区"

pagination:
  enabled: false

output:
  primary_key: ["ts_code", "end_date", "bz_item"]
  sort_by: ["bz_sales"]
  columns:
    ts_code: {type: string, required: true}
    end_date: {type: date, format: "%Y%m%d", required: true}
    bz_item: {type: string, required: true}
    bz_code: {type: string}
    parent_code: {type: string}
    bz_sales: {type: float}
    bz_profit: {type: float}
    bz_cost: {type: float}
    curr_type: {type: string}
    update_flag: {type: string}
```


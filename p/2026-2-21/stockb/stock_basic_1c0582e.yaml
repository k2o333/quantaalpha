api_name: stock_basic
derived_fields:
  delist_date_dt:
    description: 日期类型的delist_date
    format: '%Y%m%d'
    source: delist_date
    type: date
  list_date_dt:
    description: 日期类型的list_date
    format: '%Y%m%d'
    source: list_date
    type: date
description: 股票列表
name: stock_basic

# Fields 配置：指定返回所有字段（默认字段 + 非默认字段）
fields:
  # 默认字段（标记为"Y"的字段）
  - ts_code       # TS代码
  - symbol        # 股票代码
  - name          # 股票名称
  - area          # 地域
  - industry      # 所属行业
  - cnspell       # 拼音缩写
  - market        # 市场类型
  - list_date     # 上市日期
  - act_name      # 实控人名称
  - act_ent_type  # 实控人企业性质
  # 非默认字段（标记为"N"的字段）
  - fullname      # 股票全称
  - enname        # 英文全称
  - exchange      # 交易所代码
  - curr_type     # 交易货币
  - list_status   # 上市状态
  - delist_date   # 退市日期
  - is_hs         # 是否沪深港通标的
output:
  primary_key:
  - ts_code
  sort_by:
  - ts_code

# 分页配置
pagination:
  default_limit: 5000
  enabled: true
  limit_key: limit
  mode: offset
  offset_key: offset

# 参数配置
parameters:
  exchange:
    description: 交易所 SSE上交所 SZSE深交所
    required: false
    type: string
  list_status:
    default: L
    description: 上市状态 L上市 D退市 P暂停上市 S终止上市
    options:
    - L
    - D
    - P
    - S
    required: false
    type: string

# 权限配置
permissions:
  min_points: 2000
  query_limit: 10000
  rate_limit: 60

# 请求配置
request:
  extra_path: ''
  method: POST
  timeout: 30

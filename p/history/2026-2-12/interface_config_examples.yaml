# 接口配置示例 - date_params 配置

# ============================================
# 1. 日线数据接口 (date_range 模式)
# ============================================
api_name: daily_basic
description: 每日指标

date_params:
  mode: "date_range"              # 使用 start_date + end_date 查询
  data_date_column: "trade_date"  # 数据中的日期字段名
  input_mapping:                  # 参数名映射
    start_date: "start_date"
    end_date: "end_date"
  default_start_date: "20000101"  # 默认起始日期
  lookback_days: 7                # 回溯天数（处理数据延迟）

duplicate_detection:
  enabled: true
  date_column: "trade_date"
  threshold: 0.95

pagination:
  enabled: true
  mode: stock_loop

parameters:
  ts_code:
    type: string
    required: false
  start_date:
    type: string
    required: false
  end_date:
    type: string
    required: false

fields:
  ts_code: string
  trade_date: string
  close: float
  # ... 其他字段

---

# ============================================
# 2. 交易日期模式接口 (trade_date 模式)
# ============================================
api_name: moneyflow
description: 个股资金流向

date_params:
  mode: "trade_date"              # 按单个交易日期查询
  data_date_column: "trade_date"  # 数据中的日期字段
  input_mapping:
    trade_date: "trade_date"
  default_start_date: "20000101"
  lookback_days: 7

duplicate_detection:
  enabled: true
  date_column: "trade_date"

pagination:
  enabled: true
  mode: stock_loop

parameters:
  ts_code:
    type: string
    required: false
  trade_date:
    type: string
    required: false
  start_date:
    type: string
    required: false
  end_date:
    type: string
    required: false

fields:
  ts_code: string
  trade_date: string
  buy_sm_amount: float
  # ... 其他字段

---

# ============================================
# 3. 财报数据接口 (period 模式)
# ============================================
api_name: income_vip
description: 利润表(VIP)

date_params:
  mode: "period"                  # 按报告期查询
  data_date_column: "end_date"    # 数据中的日期字段（报告期）
  input_mapping:
    period: "end_date"            # period 参数映射到 end_date
  default_start_date: "20100101"
  lookback_days: 0                # 财报数据不需要回溯

duplicate_detection:
  enabled: true
  key_columns: [ts_code, end_date]  # 使用组合键检测重复

pagination:
  enabled: true
  mode: stock_loop

parameters:
  ts_code:
    type: string
    required: false
  period:
    type: string
    required: false
  start_date:
    type: string
    required: false
  end_date:
    type: string
    required: false

fields:
  ts_code: string
  ann_date: string
  f_ann_date: string
  end_date: string
  # ... 其他字段

---

# ============================================
# 4. 日期锚定模式接口 (date_anchor 模式)
# ============================================
api_name: disclosure_date
description: 财报披露计划

date_params:
  mode: "date_anchor"             # 日期锚定模式
  data_date_column: "end_date"    # 数据中的日期字段
  anchor_param: "end_date"        # 锚定参数名
  enumerate_dates: true           # 需要遍历所有可能的日期值
  default_start_date: "20100101"

duplicate_detection:
  enabled: true
  key_columns: [ts_code, end_date]

pagination:
  enabled: true
  mode: stock_loop
  date_anchor:
    reverse: true

parameters:
  ts_code:
    type: string
    required: false
  end_date:
    type: string
    required: false
    is_date_anchor: true          # 标记为日期锚定参数

fields:
  ts_code: string
  ann_date: string
  end_date: string
  pre_date: string
  actual_date: string
  # ... 其他字段

---

# ============================================
# 5. 无日期参数接口 (none 模式)
# ============================================
api_name: stock_company
description: 上市公司基本信息

date_params:
  mode: "none"                    # 无日期参数
  # 不需要 data_date_column

duplicate_detection:
  enabled: true
  key_column: "ts_code"           # 只按股票代码检测

pagination:
  enabled: true
  mode: stock_loop

parameters:
  ts_code:
    type: string
    required: false
  exchange:
    type: string
    required: false

fields:
  ts_code: string
  exchange: string
  chairman: string
  # ... 其他字段

---

# ============================================
# 6. 复杂日期范围接口 (多日期字段)
# ============================================
api_name: block_trade
description: 大宗交易

date_params:
  mode: "date_range"
  data_date_column: "trade_date"  # 主日期字段
  input_mapping:
    start_date: "start_date"
    end_date: "end_date"
  default_start_date: "20100101"
  lookback_days: 7

duplicate_detection:
  enabled: true
  date_column: "trade_date"

pagination:
  enabled: true
  mode: stock_loop

parameters:
  ts_code:
    type: string
    required: false
  trade_date:
    type: string
    required: false
  start_date:
    type: string
    required: false
  end_date:
    type: string
    required: false

fields:
  ts_code: string
  trade_date: string
  price: float
  vol: float
  amount: float
  buyer: string
  seller: string

---

# ============================================
# 配置说明
# ============================================
#
# date_params 字段说明：
#
# mode: 参数模式
#   - date_range: 使用 start_date + end_date 查询（日线数据）
#   - trade_date: 按单个交易日期查询（资金流向等）
#   - period: 按报告期查询（财报数据）
#   - date_anchor: 日期锚定模式（披露日期等）
#   - none: 无日期参数（基本信息等）
#
# data_date_column: 数据文件中日期字段的名称
#   - 用于读取现有数据检测缺失
#   - 常见值: trade_date, end_date, ann_date, cal_date
#
# input_mapping: 参数名映射
#   - 将标准参数名映射到接口实际参数名
#   - 例如: {period: end_date} 表示用 period 参数值传给 end_date
#
# anchor_param: 日期锚定参数名
#   - 用于 date_anchor 模式
#   - 表示哪个参数是日期锚点
#
# enumerate_dates: 是否需要遍历所有日期值
#   - true: 需要生成所有可能的日期值逐个查询
#   - false: 使用范围查询
#
# default_start_date: 默认起始日期
#   - 当没有现有数据时使用的起始日期
#
# lookback_days: 回溯天数
#   - 增量更新时从最新日期回溯的天数
#   - 用于处理数据延迟情况

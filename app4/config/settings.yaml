# 全局配置
app:
  name: "aspipe_v4"
  version: "4.0.0"

# TuShare API 配置
tushare:
  token: "${TUSHARE_TOKEN}"  # 从环境变量读取
  api_url: "http://api.tushare.pro"
  points_threshold: 2000

# 并发配置
concurrency:
  max_workers: 1      # [修改] 使用单worker
  max_queue_size: 50

# [新增] 请求重试与限流配置
request:
  retries: 3          # 最大重试次数
  retry_delay: 2      # 基础等待时间(秒)
  retry_backoff: 2    # 指数退避因子
  jitter_min: 0.05  # 请求前随机延迟最小值(秒)
  jitter_max: 0.1  # 请求前随机延迟最大值(秒)
  rate_limit: 500     # 全局默认每分钟最大请求数（当接口未配置时使用）


# 存储配置
storage:
  base_dir: "./data"
  format: "parquet"
  batch_size: 20
  async_write: true

# 日志配置
logging:
  level: "INFO"
  file: "./log/aspipe_v4.log"
  max_size_mb: 100
  backup_count: 5

# 接口组定义
groups:
  holders:
    - top10_holders
    - top10_floatholders
    - stk_holdertrade
    - pledge_detail
    - pledge_stat
    - share_float
    - stk_rewards
    - stk_managers
    - stk_surv

  # tscode-historical 组，包含所有需要股票循环模式的接口（共14个）
  tscode_historical:
    - stk_rewards
    - income_vip
    - balancesheet_vip
    - cashflow_vip
    - forecast_vip
    - express_vip
    - fina_indicator_vip
    - fina_audit
    - fina_mainbz_vip
    - disclosure_date
    - top10_floatholders
    - top10_holders
    - pledge_stat
    - pledge_detail

  daily:
    - daily
    - daily_basic
    - pro_bar
    - trade_cal
    - block_trade
    - bak_daily
    - bak_basic
    - suspend_d

  financial:
    - income
    - balancesheet
    - cashflow
    - fina_indicator
    - fina_mainbz
    - fina_audit
    - forecast
    - express
    - disclosure_date
    - report_rc

  market_data:
    - stock_basic
    - stock_company
    - stock_st
    - namechange
    - new_share
    - moneyflow
    - moneyflow_dc
    - moneyflow_ths
    - moneyflow_ind_dc
    - moneyflow_ind_ths
    - moneyflow_cnt_ths
    - moneyflow_mkt_dc

  analysis_factors:
    - stk_factor
    - stk_factor_pro
    - cyq_chips

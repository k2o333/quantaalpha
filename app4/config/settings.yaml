app:
  name: "aspipe_v4"
  version: "4.0.0"

tushare:
  token: "${TUSHARE_TOKEN}"
  base_url: "http://api.tushare.pro"
  points_thresholds: # 积分权限映射
    basic: 120
    standard: 2000
    advanced: 5000
    professional: 8000

concurrency:
  max_workers: 4  # [修改] 从 8 改为 4
  max_queue_size: 1000

request:
  max_retries: 3
  retry_delay: 1.0
  timeout: 30

cache:
  directory: "cache"
  ttl_hours: 24
  max_size_gb: 10

storage:
  base_dir: "data"
  format: "parquet"
  batch_size: 10000  # [优化] 从 1000 增大到 10000

logging:
  level: "INFO"
  file: "log/app4.log"
  max_size_mb: 100
  backup_count: 5

groups:
  # 需要股票循环的接口组（默认起始日期19900101）
  tscode_historical:
    - stk_rewards
    - income_vip
    - balancesheet_vip
    - cashflow_vip
    - forecast_vip
    - express_vip
    - fina_indicator_vip
    - fina_audit
    - fina_mainbz_vip
    - disclosure_date
    - top10_floatholders
    - top10_holders
    - pledge_stat
    - pledge_detail
    - dividend  # 新增
    - stk_factor
    - stk_factor_pro

  # 股东数据组
  holders:
    - top10_holders
    - top10_floatholders
    - stk_holdertrade
    - pledge_detail
    - pledge_stat
    - share_float
    - stk_rewards
    - stk_managers
    - stk_surv

  # VIP财务数据组
  financial_vip:
    - income_vip
    - balancesheet_vip
    - cashflow_vip
    - fina_indicator_vip
    - fina_mainbz_vip
    - express_vip
    - forecast_vip

  # 基础财务数据组
  financial_basic:
    - income
    - balancesheet
    - cashflow
    - fina_indicator
    - fina_mainbz
    - fina_audit
    - express
    - forecast

  # 日线市场数据组
  daily:
    - daily
    - daily_basic
    - pro_bar
    - trade_cal
    - block_trade
    - bak_daily
    - bak_basic
    - suspend_d

  # 资金流向数据组
  moneyflow:
    - moneyflow
    - moneyflow_ths
    - moneyflow_dc
    - moneyflow_ind_ths
    - moneyflow_ind_dc
    - moneyflow_cnt_ths
    - moneyflow_mkt_dc

  # 特色指标数据组
  features:
    - cyq_chips
    - cyq_perf
    - stk_factor
    - stk_factor_pro
    - stk_premarket

  # 公司信息数据组
  company_info:
    - stock_basic
    - stock_company
    - namechange
    - new_share
    - disclosure_date

  # 其他数据组
  others:
    - repurchase
    - stock_hsgt
    - stock_st
    - suspend_d
    - bak_basic
    - bak_daily
    - report_rc  # 卖方盈利预测数据
    - broker_recommend
    - dividend
    - share_float
    - stk_holdertrade
    - stk_managers
    - stk_surv
api_name: namechange

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS代码
  - ann_date          # 公告日期
  - name              # 曾用名
  - start_date        # 起始日期
  - end_date          # 截止日期
  - change_reason     # 变更原因

derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
  start_date_dt:
    description: 日期类型的start_date
    format: '%Y%m%d'
    source: start_date
    type: date
description: 股票曾用名
name: namechange
output:
  primary_key:
  - ts_code
  - ann_date
  - name
  - start_date
  - end_date
  - change_reason
  sort_by:
  - ann_date
pagination:
  enabled: true
  mode: reverse_date_range
  window_size_days: 365
parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  end_date:
    description: 公告结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 公告开始日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: TS代码
    required: false
    type: string
permissions:
  min_points: 0
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

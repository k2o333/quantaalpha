api_name: moneyflow_cnt_ths

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # 概念代码
  - trade_date        # 交易日期
  - name              # 概念名称
  - close             # 收盘价
  - pct_change        # 涨跌幅（%）
  - net_amount        # 净流入额（万元）
  - net_amount_rate   # 净流入率（%）

derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 概念板块资金流向（同花顺）
name: moneyflow_cnt_ths
output:
  primary_key:
  - trade_date
  - ts_code
  - name
  - close
  - pct_change
  - net_amount
  - net_amount_rate
  sort_by:
  - trade_date
pagination:
  date_field: trade_date
  enabled: true
  mode: reverse_date_range
  window_size_days: 1
  offset:
    enabled: true
    limit: 4000  # 每次请求最多 5000 条记录，避免 API 6400 条限制导致数据截断

parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 代码
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 5000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

api_name: stock_st

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # 股票代码
  - name              # 股票名称
  - trade_date        # 交易日期
  - type              # 类型
  - type_name         # 类型名称

derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: ST股票列表
name: stock_st
output:
  primary_key:
  - ts_code
  - name
  - trade_date
  - type
  - type_name
  sort_by:
  - trade_date
pagination:
  date_field: trade_date
  enabled: true
  mode: reverse_date_range
  window_size_days: 365
  offset:
    enabled: true
    limit: 1000
    commit_on_success: true   # 原子提交，确保窗口数据完整性

parameters:
  end_date:
    description: 结束时间 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 开始时间 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 3000
  query_limit: 1000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

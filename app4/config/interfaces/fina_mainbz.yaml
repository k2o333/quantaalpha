name: fina_mainbz
api_name: fina_mainbz
description: "主营业务构成"

permissions:
  min_points: 2000
  rate_limit: 60
  query_limit: 100

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "股票代码"
  period:
    type: string
    required: false
    description: "报告期 YYYYMMDD"
  type:
    type: string
    required: false
    description: "类型：P按产品 D按地区 I按行业"
  start_date:
    type: string
    required: false
    description: "报告期开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "报告期结束日期 YYYYMMDD"

pagination:
  enabled: true
  mode: "date_range"
  window_size_days: 365

output:
  primary_key: ["ts_code", "end_date", "bz_item"]
  sort_by: ["end_date"]
  columns:
    ts_code: {type: string, required: true}
    end_date: {type: date, format: "%Y%m%d", required: true}
    bz_item: {type: string, required: true}
    bz_sales: {type: float}
    bz_profit: {type: float}
    bz_cost: {type: float}
    curr_type: {type: string}
    update_flag: {type: string}
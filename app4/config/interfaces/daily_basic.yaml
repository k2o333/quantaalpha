api_name: daily_basic

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS代码
  - trade_date        # 交易日期
  - close             # 收盘价
  - turnover_rate     # 换手率（%）
  - turnover_rate_f   # 换手率（自由流通股）
  - volume_ratio      # 量比
  - pe                # 市盈率（总市值/净利润）
  - pe_ttm            # 市盈率TTM
  - pb                # 市净率（总市值/净资产）
  - ps                # 市销率
  - ps_ttm            # 市销率TTM
  - dv_ratio          # 股息率（%）
  - dv_ttm            # 股息率TTM（%）
  - total_share       # 总股本（万股）
  - float_share       # 流通股本（万股）
  - free_share        # 自由流通股本（万）
  - total_mv          # 总市值（万元）
  - circ_mv           # 流通市值（万元）

derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 每日指标
name: daily_basic
output:
  primary_key:
  - ts_code
  - trade_date
  - close
  - turnover_rate
  - turnover_rate_f
  - volume_ratio
  - pe
  - pe_ttm
  - pb
  - ps
  - ps_ttm
  - dv_ratio
  - dv_ttm
  - total_share
  - float_share
  - free_share
  - total_mv
  - circ_mv
  sort_by:
  - trade_date
pagination:
  enabled: true
  mode: reverse_date_range
  window_size_days: 1
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 2000
  query_limit: 10000
  rate_limit: 120
request:
  extra_path: ''
  method: POST
  timeout: 30

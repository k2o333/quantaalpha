api_name: daily_basic

# fields 配置：如果需要额外字段，请取消注释并配置
# fields:
#   - close         # 当日收盘价
#   - turnover_rate # 换手率
#   - turnover_rate_f # 换手率(自由流通股)
#   - volume_ratio # 量比
#   - pe           # 市盈率
#   - pe_ttm       # 市盈率TTM
#   - pb           # 市净率
#   - ps           # 市销率
#   - ps_ttm       # 市销率TTM
#   - dv_ratio   # 股息率
#   - dv_ttm     # 股息率TTM
#   - total_share # 总股本
#   - float_share # 流通股本
#   - free_share  # 自由流通股本
#   - total_mv    # 总市值
#   - circ_mv     # 流通市值

derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 每日指标
name: daily_basic
output:
  primary_key:
  - ts_code
  - trade_date
  sort_by:
  - trade_date
pagination:
  enabled: true
  mode: date_range
  window_size_days: 365
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 2000
  query_limit: 10000
  rate_limit: 120
request:
  extra_path: ''
  method: POST
  timeout: 30

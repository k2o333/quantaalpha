api_name: disclosure_date
derived_fields:
  actual_date_dt:
    description: 日期类型的actual_date
    format: '%Y%m%d'
    source: actual_date
    type: date
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
  pre_date_dt:
    description: 日期类型的pre_date
    format: '%Y%m%d'
    source: pre_date
    type: date
description: 财报披露计划
name: disclosure_date
output:
  primary_key:
  - ts_code
  - end_date
  sort_by:
  - end_date
  dedup_enabled: true
duplicate_detection:
  enabled: true
  key_columns:
  - ts_code
  - end_date
pagination:
  enabled: true
  mode: stock_loop
  window_size_days: 9999 # 每个股票请求10年数据
  stock_loop:
    enabled: true
    skip_existing: false
  date_anchor:
    reverse: true
parameters:
  end_date:
    description: 报告期 YYYYMMDD
    type: string
    is_date_anchor: true  # 标识为日期锚定参数，用于--start_date --end_date范围查询
  ts_code:
    description: TS股票代码
    type: string
permissions:
  min_points: 500
  query_limit: 3000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

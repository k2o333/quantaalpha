name: disclosure_date
api_name: disclosure_date
description: "财报披露计划"

permissions:
  min_points: 500
  rate_limit: 60
  query_limit: 3000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "TS股票代码"
  end_date:
    type: string
    required: false
    description: "财报周期 YYYYMMDD"
  pre_date:
    type: string
    required: false
    description: "计划披露日期 YYYYMMDD"
  ann_date:
    type: string
    required: false
    description: "最新披露公告日 YYYYMMDD"
  actual_date:
    type: string
    required: false
    description: "实际披露日期 YYYYMMDD"

pagination:
  enabled: true
  mode: "date_range"
  window_size_days: 365

output:
  primary_key: ["ts_code", "end_date"]
  sort_by: ["end_date"]
  columns:
    ts_code: {type: string, required: true}
    ann_date: {type: date, format: "%Y%m%d", required: true}
    end_date: {type: date, format: "%Y%m%d", required: true}
    pre_date: {type: date, format: "%Y%m%d", required: true}
    actual_date: {type: date, format: "%Y%m%d"}
    modify_date: {type: date, format: "%Y%m%d"}
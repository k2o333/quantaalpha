name: bak_daily
api_name: bak_daily
description: "备用行情"

permissions:
  min_points: 5000
  rate_limit: 60
  query_limit: 7000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "股票代码"
  trade_date:
    type: string
    required: false
    description: "交易日期 YYYYMMDD"
  start_date:
    type: string
    required: false
    description: "开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "结束日期 YYYYMMDD"
  offset:
    type: string
    required: false
    description: "开始行数"
  limit:
    type: string
    required: false
    description: "最大行数"

pagination:
  enabled: true
  mode: "date_range"
  window_size_days: 365

output:
  primary_key: ["ts_code", "trade_date"]
  sort_by: ["trade_date"]
  columns:
    ts_code: {type: string, required: true}
    trade_date: {type: date, format: "%Y%m%d", required: true}
    name: {type: string, required: true}
    pct_change: {type: float}
    close: {type: float}
    change: {type: float}
    open: {type: float}
    high: {type: float}
    low: {type: float}
    pre_close: {type: float}
    vol_ratio: {type: float}
    turn_over: {type: float}
    swing: {type: float}
    vol: {type: float}
    amount: {type: float}
    selling: {type: float}
    buying: {type: float}
    total_share: {type: float}
    float_share: {type: float}
    pe: {type: float}
    industry: {type: string}
    area: {type: string}
    float_mv: {type: float}
    total_mv: {type: float}
    avg_price: {type: float}
    strength: {type: float}
    activity: {type: float}
    avg_turnover: {type: float}
    attack: {type: float}
    interval_3: {type: float}
    interval_6: {type: float}
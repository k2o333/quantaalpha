api_name: bak_daily
derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 备用行情
name: bak_daily
output:
  primary_key:
  - ts_code
  - trade_date
  sort_by:
  - trade_date
pagination:
  enabled: true
  mode: date_range
  window_size_days: 365
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  limit:
    description: 最大行数
    required: false
    type: string
  offset:
    description: 开始行数
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 7000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

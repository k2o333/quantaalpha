api_name: moneyflow_ths

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS代码
  - trade_date        # 交易日期
  - buy_sm_vol        # 小单买入量（手）
  - buy_sm_amount     # 小单买入金额（万元）
  - sell_sm_vol       # 小单卖出量（手）
  - sell_sm_amount    # 小单卖出金额（万元）
  - buy_md_vol        # 中单买入量（手）
  - buy_md_amount     # 中单买入金额（万元）
  - sell_md_vol       # 中单卖出量（手）
  - sell_md_amount    # 中单卖出金额（万元）
  - buy_lg_vol        # 大单买入量（手）
  - buy_lg_amount     # 大单买入金额（万元）
  - sell_lg_vol       # 大单卖出量（手）
  - sell_lg_amount    # 大单卖出金额（万元）
  - buy_elg_vol       # 特大单买入量（手）
  - buy_elg_amount    # 特大单买入金额（万元）
  - sell_elg_vol      # 特大单卖出量（手）
  - sell_elg_amount   # 特大单卖出金额（万元）
  - net_mf_vol        # 净流入量（手）
  - net_mf_amount     # 净流入额（万元）

derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 个股资金流向（同花顺）
name: moneyflow_ths
output:
  primary_key:
  - ts_code
  - trade_date
  - buy_sm_vol
  - buy_sm_amount
  - sell_sm_vol
  - sell_sm_amount
  - buy_md_vol
  - buy_md_amount
  - sell_md_vol
  - sell_md_amount
  - buy_lg_vol
  - buy_lg_amount
  - sell_lg_vol
  - sell_lg_amount
  - buy_elg_vol
  - buy_elg_amount
  - sell_elg_vol
  - sell_elg_amount
  - net_mf_vol
  - net_mf_amount
  sort_by:
  - trade_date
pagination:
  enabled: true
  mode: reverse_date_range
  window_size_days: 365
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 6000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

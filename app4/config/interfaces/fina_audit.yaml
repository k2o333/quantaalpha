name: fina_audit
api_name: fina_audit
description: "财务审计意见"

permissions:
  min_points: 500
  rate_limit: 60
  query_limit: 10000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "股票代码"
  ann_date:
    type: string
    required: false
    description: "公告日期 YYYYMMDD"
  start_date:
    type: string
    required: false
    description: "公告开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "公告结束日期 YYYYMMDD"
  period:
    type: string
    required: false
    description: "报告期 YYYYMMDD"

pagination:
  enabled: true
  mode: "stock_loop"

output:
  primary_key: ["ts_code", "ann_date", "end_date"]
  sort_by: ["ann_date"]
  columns:
    ts_code: {type: string, required: true}
    ann_date: {type: date, format: "%Y%m%d", required: true}
    end_date: {type: date, format: "%Y%m%d", required: true}
    audit_result: {type: string}
    audit_fees: {type: float}
    audit_agency: {type: string}
    audit_sign: {type: string}
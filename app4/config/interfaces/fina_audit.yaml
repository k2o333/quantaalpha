api_name: fina_audit
derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 财务审计意见
name: fina_audit
output:
  primary_key:
  - ts_code
  - ann_date
  - end_date
  sort_by:
  - ann_date
pagination:
  enabled: true
  mode: stock_loop
  time_range:
    window: 9999d
parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  end_date:
    description: 公告结束日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false  # 明确标识为日期范围参数，不是锚定参数
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 公告开始日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false  # 明确标识为日期范围参数，不是锚定参数
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 500
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

api_name: forecast_vip
derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
  first_ann_date_dt:
    description: 日期类型的first_ann_date
    format: '%Y%m%d'
    source: first_ann_date
    type: date
description: 业绩预告(VIP) - 按季度获取全部上市公司数据
name: forecast_vip
output:
  primary_key:
  - ts_code
  - ann_date
  - end_date
  - update_flag
  sort_by:
  - ann_date
pagination:
  enabled: true
  mode: stock_loop
  window_size_days: 3650  # 每个股票请求10年数据
parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  end_date:
    description: 公告结束日期 YYYYMMDD
    required: false
    type: string
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 公告开始日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码(可选，不填则获取全部股票)
    required: false
    type: string
  type:
    description: 预告类型(预增/预减/扭亏/首亏/续亏/续盈/略增/略减)
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

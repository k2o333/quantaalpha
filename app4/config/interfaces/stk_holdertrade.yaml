api_name: stk_holdertrade

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS股票代码
  - ann_date          # 公告日期
  - holder_name       # 股东名称
  - holder_type       # 股东类型 C公司 P个人 G高管
  - trade_type        # 交易类型 IN增持 DE减持
  - begin_date        # 变动开始日期
  - close_date        # 变动截止日期
  - hold_vol          # 变动数量（股）
  - hold_ratio        # 变动比例（%）

derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  begin_date_dt:
    description: 日期类型的begin_date
    format: '%Y%m%d'
    source: begin_date
    type: date
  close_date_dt:
    description: 日期类型的close_date
    format: '%Y%m%d'
    source: close_date
    type: date
description: 股东增减持
name: stk_holdertrade
output:
  primary_key:
  - ts_code
  - ann_date
  - holder_name
  - holder_type
  - trade_type
  - begin_date
  - close_date
  - hold_vol
  - hold_ratio
  sort_by:
  - ann_date
pagination:
  date_field: ann_date
  enabled: true
  mode: reverse_date_range
  window_size_days: 365
parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  end_date:
    description: 公告结束日期 YYYYMMDD
    required: false
    type: string
  holder_type:
    description: 股东类型C公司P个人G高管
    required: false
    type: string
  start_date:
    description: 公告开始日期 YYYYMMDD
    required: false
    type: string
  trade_type:
    description: 交易类型IN增持DE减持
    required: false
    type: string
  ts_code:
    description: TS股票代码
    required: false
    type: string
permissions:
  min_points: 2000
  query_limit: 3000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

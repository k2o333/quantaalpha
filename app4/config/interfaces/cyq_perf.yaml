api_name: cyq_perf

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # 股票代码
  - trade_date        # 交易日期
  - his_low           # 获利盘最低价
  - his_high          # 获利盘最高价
  - cost_5pct         # 5%获利盘对应价格
  - cost_15pct        # 15%获利盘对应价格
  - cost_50pct        # 50%获利盘对应价格
  - cost_85pct        # 85%获利盘对应价格
  - cost_95pct        # 95%获利盘对应价格
  - weight_avg        # 加权平均价
  - winner_rate       # 获利盘比例（%）

derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 每日筹码及胜率
name: cyq_perf
output:
  primary_key:
  - ts_code
  - trade_date
  - his_low
  - his_high
  - cost_5pct
  - cost_15pct
  - cost_50pct
  - cost_85pct
  - cost_95pct
  - weight_avg
  - winner_rate
  sort_by:
  - trade_date
pagination:
  enabled: true
  mode: reverse_date_range    # 改为反向日期范围模式
  window_size_days: 1         # 每天一个窗口（该接口适合按天下载）
  empty_threshold_days: 90    # 连续90天无数据停止
parameters:
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: true  # 标识为日期锚定参数
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 120
  query_limit: 5000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30
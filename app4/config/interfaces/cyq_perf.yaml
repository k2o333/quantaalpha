api_name: cyq_perf
derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 每日筹码及胜率
name: cyq_perf
output:
  primary_key:
  - ts_code
  - trade_date
  sort_by:
  - trade_date
pagination:
  enabled: true
  mode: reverse_date_range    # 改为反向日期范围模式
  window_size_days: 1         # 每天一个窗口（该接口适合按天下载）
  empty_threshold_days: 90    # 连续90天无数据停止
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 120
  query_limit: 5000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
2 timeout: 30
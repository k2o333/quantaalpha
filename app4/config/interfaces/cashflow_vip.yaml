pagination:
  enabled: true
  mode: period_range
  periods_per_batch: 1  # 每次下载的 period 数量，默认为 1
  offset:
    enabled: true
    limit: 6300  # 每次请求最多 5000 条记录，避免 API 6400 条限制导致数据截断
    commit_on_success: true
parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  comp_type:
    description: 公司类型
    required: false
    type: string
  end_date:
    description: 公告结束日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  f_ann_date:
    description: 实际公告日期 YYYYMMDD
    required: false
    type: string
  is_calc:
    description: 是否计算报表
    required: false
    type: int
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  report_type:
    description: 报告类型
    required: false
    type: string
  start_date:
    description: 公告开始日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  ts_code:
    description: 股票代码(可选，不填则获取全部股票)
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 10000
  rate_limit: 60

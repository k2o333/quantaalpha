api_name: cashflow_vip
derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
  f_ann_date_dt:
    description: 日期类型的f_ann_date
    format: '%Y%m%d'
    source: f_ann_date
    type: date
description: 现金流量表(VIP) - 按季度获取全部上市公司数据
name: cashflow_vip
output:
  primary_key:
  - ts_code
  - ann_date
  - end_date
  sort_by:
  - ann_date
  - end_date
pagination:
  enabled: true
  mode: stock_loop
  window_size_days: 3650  # 每个股票请求10年数据
parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  comp_type:
    description: 公司类型
    required: false
    type: string
  end_date:
    description: 公告结束日期 YYYYMMDD
    required: false
    type: string
  f_ann_date:
    description: 实际公告日期 YYYYMMDD
    required: false
    type: string
  is_calc:
    description: 是否计算报表
    required: false
    type: int
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  report_type:
    description: 报告类型
    required: false
    type: string
  start_date:
    description: 公告开始日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码(可选，不填则获取全部股票)
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

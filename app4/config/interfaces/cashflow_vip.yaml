name: cashflow_vip
api_name: cashflow_vip
description: "现金流量表(VIP) - 按季度获取全部上市公司数据"

permissions:
  min_points: 5000
  rate_limit: 60
  query_limit: 10000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "股票代码(可选，不填则获取全部股票)"
  ann_date:
    type: string
    required: false
    description: "公告日期 YYYYMMDD"
  f_ann_date:
    type: string
    required: false
    description: "实际公告日期 YYYYMMDD"
  start_date:
    type: string
    required: false
    description: "公告开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "公告结束日期 YYYYMMDD"
  period:
    type: string
    required: false
    description: "报告期 YYYYMMDD"
  report_type:
    type: string
    required: false
    description: "报告类型"
  comp_type:
    type: string
    required: false
    description: "公司类型"
  is_calc:
    type: int
    required: false
    description: "是否计算报表"

pagination:
  enabled: true
  mode: "date_range"
  window_size_days: 365

output:
  primary_key: ["ts_code", "ann_date", "end_date"]
  sort_by: ["ann_date", "end_date"]
  columns:
    ts_code: {type: string, required: true}
    ann_date: {type: date, format: "%Y%m%d"}
    f_ann_date: {type: date, format: "%Y%m%d"}
    end_date: {type: date, format: "%Y%m%d", required: true}
    comp_type: {type: string}
    report_type: {type: string}
    end_type: {type: string}
    net_profit: {type: float}
    finan_exp: {type: float}
    c_fr_sale_sg: {type: float}
    recp_tax_rends: {type: float}
    n_depos_incr_fi: {type: float}
    n_incr_loans_cb: {type: float}
    n_inc_borr_oth_fi: {type: float}
    prem_fr_orig_contr: {type: float}
    n_incr_insured_dep: {type: float}
    n_reinsur_prem: {type: float}
    n_incr_disp_tfa: {type: float}
    ifc_cash_incr: {type: float}
    n_incr_disp_faas: {type: float}
    n_incr_loans_oth_bank: {type: float}

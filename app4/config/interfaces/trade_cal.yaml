api_name: trade_cal

# Fields配置：显式指定所有返回字段
fields:
  - exchange       # 交易所代码
  - cal_date       # 日历日期
  - is_open        # 是否交易 0休市 1交易
  - pretrade_date  # 上一交易日

derived_fields:
  cal_date_dt:
    description: 日期类型的cal_date
    format: '%Y%m%d'
    source: cal_date
    type: date
  is_open_bool:
    description: 布尔类型的is_open，Polars查询性能最优
    source: is_open
    type: boolean
  pretrade_date_dt:
    description: 日期类型的pretrade_date
    format: '%Y%m%d'
    source: pretrade_date
    type: date
description: 交易日历
name: trade_cal
output:
  primary_key:
  - exchange
  - cal_date
  - is_open
  - pretrade_date
  sort_by:
  - cal_date
pagination:
  enabled: true
  mode: date_range
  window_size_days: 365
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  exchange:
    default: SSE
    description: 交易所 SSE上交所 SZSE深交所
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
permissions:
  min_points: 2000
  query_limit: 10000
  rate_limit: 120
request:
  extra_path: ''
  method: POST
  timeout: 30

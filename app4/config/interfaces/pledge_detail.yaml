api_name: pledge_detail

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # 股票代码
  - ann_date          # 公告日期
  - holder_name       # 股东名称
  - start_date        # 质押开始日期
  - end_date          # 质押结束日期
  - release_date      # 解除日期
  - pledge_amount     # 质押数量（股）
  - pledge_ratio      # 质押比例（%）
  - is_release        # 是否已解除 Y是 N否
  - total_share       # 股东总持股（股）
  - pledge_type       # 质押类型

derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
  release_date_dt:
    description: 日期类型的release_date
    format: '%Y%m%d'
    source: release_date
    type: date
  start_date_dt:
    description: 日期类型的start_date
    format: '%Y%m%d'
    source: start_date
    type: date
description: 股权质押明细
duplicate_detection:
  enabled: true
  date_column: "ann_date"
  stock_level_detection: true
name: pledge_detail
output:
  primary_key:
  - ts_code
  - ann_date
  - holder_name
  - start_date
  - pledge_amount
  - is_release
  - end_date
  - release_date
  - pledge_ratio
  - total_share
  - pledge_type
  sort_by:
  - ann_date
  - ts_code
pagination:
  enabled: true
  mode: stock_loop
  time_range:
    window: 9999d
parameters:
  ts_code:
    description: 股票代码
    required: true
    type: string
permissions:
  min_points: 500
  query_limit: 1000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

api_name: cyq_chips

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # 股票代码
  - trade_date        # 交易日期
  - price             # 成本价
  - percent           # 筹码比例（%）

derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 每日筹码分布
duplicate_detection:
  enabled: true
  date_column: "trade_date"
  stock_level_detection: true
name: cyq_chips
output:
  primary_key:
  - ts_code
  - trade_date
  - price
  - percent
  sort_by:
  - price
pagination:
  enabled: true
  mode: stock_loop
  skip_time_range_in_full_history: false
  time_range:
    enabled: true 
    window: 90d
    stop_on_empty: 90   # 连续90天无数据停止
  offset:
    enabled: true
    limit: 3000
    commit_on_success: true
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: true
    type: string
permissions:
  min_points: 120
  query_limit: 2000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

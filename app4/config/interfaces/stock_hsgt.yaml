api_name: stock_hsgt

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS代码
  - trade_date        # 交易日期
  - type              # 类型
  - in_date           # 纳入日期
  - out_date          # 剔除日期

derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 沪深港通股票列表
name: stock_hsgt
output:
  primary_key:
  - ts_code
  - trade_date
  - type
  - in_date
  - out_date
  sort_by:
  - trade_date
  - ts_code
pagination:
  enabled: true
  mode: type_split
  window_size_days: 1  # 每天每个分类请求一次，确保不超过 2000 条限制
type_values: ['HK_SZ', 'SZ_HK', 'HK_SH', 'SH_HK']
parameters:
  end_date:
    description: 结束时间
    required: false
    type: string
  start_date:
    description: 开始时间
    required: false
    type: string
  trade_date:
    description: 交易日期（格式：YYYYMMDD）
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
  type:
    description: 类型（HK_SZ深股通, SZ_HK港股通(深), HK_SH沪股通, SH_HK港股通(沪)）
    required: true
    type: string
permissions:
  min_points: 3000
  query_limit: 2000
  rate_limit: 120
request:
  extra_path: ''
  method: POST
  timeout: 30

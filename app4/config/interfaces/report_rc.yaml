api_name: report_rc
derived_fields:
  report_date_dt:
    description: 日期类型的report_date
    format: '%Y%m%d'
    source: report_date
    type: date
description: 卖方盈利预测数据
name: report_rc
output:
  primary_key:
  - ts_code
  - report_date
  - org_name
  sort_by:
  - report_date
pagination:
  enabled: true
  mode: date_range
  window_size_days: 365
parameters:
  end_date:
    description: 报告结束日期 YYYYMMDD
    required: false
    type: string
  report_date:
    description: 报告日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 报告开始日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 8000
  query_limit: 3000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

name: trade_cal
api_name: trade_cal
description: "交易日历"

permissions:
  min_points: 2000
  rate_limit: 120
  query_limit: 10000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  exchange:
    type: string
    required: false
    default: "SSE"
    description: "交易所 SSE上交所 SZSE深交所"
  start_date:
    type: string
    required: false
    description: "开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "结束日期 YYYYMMDD"

pagination:
  enabled: true
  mode: "date_range"
  window_size_days: 365

output:
  primary_key: ["cal_date", "exchange"]
  sort_by: ["cal_date"]

derived_fields:
  cal_date_dt:
    source: cal_date
    type: date
    format: '%Y%m%d'
    description: "日期类型的cal_date"
  pretrade_date_dt:
    source: pretrade_date
    type: date
    format: '%Y%m%d'
    description: "日期类型的pretrade_date"
  is_open_bool:
    source: is_open
    type: boolean
    description: "布尔类型的is_open，Polars查询性能最优"
api_name: share_float

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS代码
  - ann_date          # 公告日期
  - float_date        # 解禁日期
  - float_share       # 流通股份（股）
  - float_ratio       # 流通股份占总股本比率
  - holder_name       # 股东名称
  - share_type        # 股份类型

derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  float_date_dt:
    description: 日期类型的float_date
    format: '%Y%m%d'
    source: float_date
    type: date
description: 限售股解禁
name: share_float
output:
  primary_key:
  - ts_code
  - ann_date
  - float_date
  - float_share
  - float_ratio
  - holder_name
  - share_type
  sort_by:
  - float_date
pagination:
  date_field: float_date
  enabled: true
  mode: reverse_date_range
  window_size_days: 1
parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  end_date:
    description: 解禁结束日期 YYYYMMDD
    required: false
    type: string
  float_date:
    description: 解禁日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 解禁开始日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: TS股票代码
    required: false
    type: string
permissions:
  min_points: 120
  query_limit: 6000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

api_name: fina_indicator_vip
derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 财务指标数据(VIP) - 按季度获取全部上市公司数据
name: fina_indicator_vip
output:
  primary_key:
  - ts_code
  - ann_date
  - end_date
  - update_flag
  sort_by:
  - ann_date
  - end_date
pagination:
  enabled: true
  mode: period_range
  periods_per_batch: 1  # 每次下载的 period 数量，默认为 1
  offset:
    enabled: true
    limit: 12000  # 每次请求最多 5000 条记录，避免 API 6400 条限制导致数据截断

parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  end_date:
    description: 报告期结束日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 报告期开始日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  ts_code:
    description: TS股票代码(可选，不填则获取全部股票)
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30
duplicate_detection:
  enabled: true
  date_column: end_date

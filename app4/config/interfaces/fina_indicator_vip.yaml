api_name: fina_indicator_vip

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS代码
  - ann_date          # 公告日期
  - end_date          # 报告期
  - eps               # 每股收益
  - dt_eps            # 稀释每股收益
  - total_revenue_ps  # 每股营业总收入
  - revenue_ps        # 每股营业收入
  - capital_rese_ps   # 每股资本公积
  - surplus_rese_ps   # 每股盈余公积
  - undist_profit_ps  # 每股未分配利润
  - extra_item        # 非经常性损益
  - profit_dedt       # 扣除非经常性损益后的净利润
  - gross_margin      # 毛利率
  - current_ratio     # 流动比率
  - quick_ratio       # 速动比率
  - cash_ratio        # 保守速动比率
  - invturn_days      # 存货周转天数
  - arturn_days       # 应收账款周转天数
  - inv_turn          # 存货周转率
  - ar_turn           # 应收账款周转率
  - ca_turn           # 流动资产周转率
  - fa_turn           # 固定资产周转率
  - assets_turn       # 总资产周转率
  - op_income         # 经营活动净收益
  - valuechange_income # 价值变动净收益
  - interst_income    # 利息费用
  - daa               # 折旧与摊销
  - ebit              # 息税前利润
  - ebitda            # 息税折旧摊销前利润
  - fcff              # 企业自由现金流量
  - fcfe              # 股权自由现金流量
  - roe               # 净资产收益率
  - roe_waa           # 加权平均净资产收益率
  - roe_dt            # 净资产收益率(扣非/摊薄)
  - roa               # 总资产净利润
  - npta              # 总资产净利润
  - roic              # 投入资本回报率
  - update_flag       # 更新标志

derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 财务指标数据(VIP) - 按季度获取全部上市公司数据
name: fina_indicator_vip
output:
  primary_key:
  - ts_code
  - ann_date
  - end_date
  - eps
  - dt_eps
  - total_revenue_ps
  - revenue_ps
  - capital_rese_ps
  - surplus_rese_ps
  - undist_profit_ps
  - extra_item
  - profit_dedt
  - gross_margin
  - current_ratio
  - quick_ratio
  - cash_ratio
  - invturn_days
  - arturn_days
  - inv_turn
  - ar_turn
  - ca_turn
  - fa_turn
  - assets_turn
  - op_income
  - valuechange_income
  - interst_income
  - daa
  - ebit
  - ebitda
  - fcff
  - fcfe
  - roe
  - roe_waa
  - roe_dt
  - roa
  - npta
  - roic
  - update_flag
  sort_by:
  - ann_date
  - end_date
pagination:
  enabled: true
  mode: period_range
  periods_per_batch: 1  # 每次下载的 period 数量，默认为 1
  offset:
    enabled: true
    limit: 12000  # 每次请求最多 5000 条记录，避免 API 6400 条限制导致数据截断

parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  end_date:
    description: 报告期结束日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 报告期开始日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  ts_code:
    description: TS股票代码(可选，不填则获取全部股票)
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30
duplicate_detection:
  enabled: true
  date_column: end_date

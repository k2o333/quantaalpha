name: fina_indicator_vip
api_name: fina_indicator_vip
description: "财务指标数据(VIP) - 按季度获取全部上市公司数据"

permissions:
  min_points: 5000
  rate_limit: 60
  query_limit: 10000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "TS股票代码(可选，不填则获取全部股票)"
  ann_date:
    type: string
    required: false
    description: "公告日期 YYYYMMDD"
  start_date:
    type: string
    required: false
    description: "报告期开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "报告期结束日期 YYYYMMDD"
  period:
    type: string
    required: false
    description: "报告期 YYYYMMDD"

pagination:
  enabled: true
  mode: "stock_loop"

output:
  primary_key: ["ts_code", "ann_date", "end_date"]
  sort_by: ["ann_date", "end_date"]
  columns:
    ts_code: {type: string, required: true}
    ann_date: {type: date, format: "%Y%m%d"}
    end_date: {type: date, format: "%Y%m%d", required: true}
    eps: {type: float}
    dt_eps: {type: float}
    total_revenue_ps: {type: float}
    revenue_ps: {type: float}
    capital_rese_ps: {type: float}
    surplus_rese_ps: {type: float}
    undist_profit_ps: {type: float}
    extra_item: {type: float}
    profit_dedt: {type: float}
    gross_margin: {type: float}
    current_ratio: {type: float}
    quick_ratio: {type: float}
    cash_ratio: {type: float}
    invturn_days: {type: float}
    arturn_days: {type: float}
    inv_turn: {type: float}
    ar_turn: {type: float}

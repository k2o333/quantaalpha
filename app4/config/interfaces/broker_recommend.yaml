name: broker_recommend
api_name: broker_recommend
description: "券商每月荐股"

permissions:
  min_points: 2000
  rate_limit: 60
  query_limit: 1000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  month:
    type: string
    required: true
    description: "月度 YYYYMM"

pagination:
  enabled: false

output:
  primary_key: ["month", "broker", "ts_code"]
  sort_by: ["month"]
  columns:
    month: {type: string, required: true}
    broker: {type: string, required: true}
    ts_code: {type: string, required: true}
    name: {type: string, required: true}
api_name: broker_recommend

# Fields配置：显式指定所有返回字段
fields:
  - month             # 月度 YYYYMM
  - broker            # 券商名称
  - ts_code           # TS代码
  - name              # 股票名称
  - recommend_reason  # 推荐理由
  - recommend_date    # 推荐日期

description: 券商每月荐股
derived_fields:
  month_dt:
    description: 日期类型的month（关联trade_cal.cal_date_dt）
    format: '%Y%m'
    source: month
    type: date
name: broker_recommend
output:
  primary_key:
  - month
  - broker
  - ts_code
  - name
  - recommend_reason
  - recommend_date
  sort_by:
  - month
pagination:
  enabled: false
parameters:
  month:
    description: 月度 YYYYMM
    required: true
    type: string
permissions:
  min_points: 2000
  query_limit: 1000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

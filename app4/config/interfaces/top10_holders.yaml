api_name: top10_holders

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS代码
  - ann_date          # 公告日期
  - end_date          # 报告期
  - holder_name       # 股东名称
  - hold_amount       # 持股数量（股）
  - hold_ratio        # 持股比例（%）
  - hold_float_ratio  # 流通股持股比例（%）
  - hold_change       # 持股变动
  - holder_type       # 股东类型

derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 前十大股东
name: top10_holders
output:
  primary_key:
  - ts_code
  - end_date
  - holder_name
  - ann_date
  - hold_amount
  - hold_ratio
  - hold_float_ratio
  - hold_change
  - holder_type
  sort_by:
  - end_date
  - ts_code
  dedup_enabled: true
pagination:
  enabled: true
  mode: period_range
  periods_per_batch: 1
  offset:
    enabled: true
    limit: 6000  # 每次请求最多 6000 条记录，避免 API 限制导致数据截断

parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  end_date:
    description: 报告期结束日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 报告期开始日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  ts_code:
    description: TS代码(可选，不填则获取全部股票)
    required: false
    type: string
permissions:
  min_points: 2000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30
duplicate_detection:
  enabled: true
  date_column: end_date

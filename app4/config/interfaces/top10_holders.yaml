api_name: top10_holders
derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 前十大股东
name: top10_holders
output:
  primary_key:
  - ts_code
  - end_date
  - holder_name
  sort_by:
  - end_date
  - ts_code
pagination:
  enabled: true
  mode: stock_loop
  window_size_days: 9999  # 每个股票请求10年数据
parameters:
  period:
    default: '20231231'
    description: 报告期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 证券代码
    required: false
    type: string
permissions:
  min_points: 2000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

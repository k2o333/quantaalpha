api_name: block_trade

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS代码
  - trade_date        # 交易日期
  - price             # 成交价
  - vol               # 成交量（手）
  - amount            # 成交金额（万元）
  - buyer             # 买方营业部
  - seller            # 卖方营业部

derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 大宗交易
name: block_trade
output:
  primary_key:
  - ts_code
  - trade_date
  - price
  - vol
  - amount
  - buyer
  - seller
  sort_by:
  - trade_date
pagination:
  enabled: true
  mode: reverse_date_range
  window_size_days: 1
  offset:
    enabled: true
    limit: 1000
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: TS代码
    required: false
    type: string
permissions:
  min_points: 300
  query_limit: 1000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

name: fina_mainbz_vip
api_name: fina_mainbz_vip
description: "主营业务构成(VIP) - 按季度获取全部上市公司数据"

permissions:
  min_points: 5000
  rate_limit: 60
  query_limit: 100

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "股票代码(可选，不填则获取全部股票)"
  period:
    type: string
    required: false
    description: "报告期(每个季度最后一天的日期,比如20171231表示年报)"
  type:
    type: string
    required: false
    description: "类型：P按产品 D按地区 I按行业"
  start_date:
    type: string
    required: false
    description: "报告期开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "报告期结束日期 YYYYMMDD"

pagination:
  enabled: true
  mode: "period_range"
  date_parameter_type: "report_period"

output:
  primary_key: ["ts_code", "end_date", "bz_item"]
  sort_by: ["end_date"]
  columns:
    ts_code: {type: string, required: true}
    end_date: {type: date, format: "%Y%m%d", required: true}
    bz_item: {type: string, required: true}
    bz_sales: {type: float}
    bz_profit: {type: float}
    bz_cost: {type: float}
    curr_type: {type: string}
    update_flag: {type: string}
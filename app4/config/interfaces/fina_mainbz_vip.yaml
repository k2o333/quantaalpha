api_name: fina_mainbz_vip
derived_fields:
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 主营业务构成(VIP) - 按季度获取全部上市公司数据
name: fina_mainbz_vip
output:
  primary_key:
  - ts_code
  - end_date
  - bz_item
  sort_by:
  - end_date
pagination:
  enabled: true
  mode: stock_loop
  time_range:
    window: 9999d
parameters:
  end_date:
    description: 报告期结束日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  period:
    description: 报告期(每个季度最后一天的日期,比如20171231表示年报)
    required: false
    type: string
  start_date:
    description: 报告期开始日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  ts_code:
    description: 股票代码(可选，不填则获取全部股票)
    required: false
    type: string
  type:
    description: 类型：P按产品 D按地区 I按行业
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 100
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30
duplicate_detection:
  enabled: true
  date_column: end_date
  stock_level_detection: true

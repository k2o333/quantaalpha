api_name: balancesheet_vip
derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 资产负债表(VIP) - 按季度获取全部上市公司数据
name: balancesheet_vip

# 配置说明：
# 此接口配置为场景1：支持 start_date/end_date 参数
# 在 stock_loop 模式下，命令行的 --start_date 和 --end_date 参数将直接透传给接口
# 每只股票会执行一次请求，包含用户指定的日期范围
# 使用方式：
# python app4/main.py --start_date 20230101 --end_date 20231231 --interface balancesheet_vip
output:
  primary_key:
  - ts_code
  - ann_date
  - end_date
  - update_flag
  sort_by:
  - ann_date
  - end_date

# 统一的去重配置
dedup_enabled: true

pagination:
  enabled: true
  mode: stock_loop
  window_size_days: 9999
parameters:
  ts_code:
    description: 股票代码(可选，不填则获取全部股票)
    required: false
    type: string
  start_date:
    description: 公告开始日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false  # 明确标识为日期范围参数，不是锚定参数
  end_date:
    description: 公告结束日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false  # 明确标识为日期范围参数，不是锚定参数
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  comp_type:
    description: 公司类型
    required: false
    type: string
  report_type:
    description: 报告类型
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30
fields:
  ts_code: string
  ann_date: string
  end_date: string
  comp_type: Int64
  report_type: string
  total_share: Float64
  total_assets: Float64
  quick_assets: Float64
  fixed_assets: Float64
  const_materials: Float64
  intang_assets: Float64
  r_and_d: Float64
  good_will: Float64
  lt_equity_inv: Float64
  total_liab: Float64
  total_cur_liab: Float64
  total_non_cur_liab: Float64
  total_sharehol_eq: Float64
  treasury_share: Float64
  other_equity: Float64
  assets_liquidation: Float64
  deferred_tax_assets: Float64
  st_borrow: Float64
  st_loan: Float64
  total_hldr_eq_exc_min_int: Float64
  total_assets_yoy: Float64
  update_flag: string

    description: 股票代码(可选，不填则获取全部股票)
    required: false
    type: string
  start_date:
    description: 公告开始日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  end_date:
    description: 公告结束日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string

name: balancesheet_vip
api_name: balancesheet_vip
description: "资产负债表(VIP) - 按季度获取全部上市公司数据"

permissions:
  min_points: 5000
  rate_limit: 60
  query_limit: 10000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "股票代码(可选，不填则获取全部股票)"
  ann_date:
    type: string
    required: false
    description: "公告日期 YYYYMMDD"
  start_date:
    type: string
    required: false
    description: "公告开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "公告结束日期 YYYYMMDD"
  period:
    type: string
    required: false
    description: "报告期 YYYYMMDD"
  report_type:
    type: string
    required: false
    description: "报告类型"
  comp_type:
    type: string
    required: false
    description: "公司类型"

pagination:
  enabled: true
  mode: "date_range"
  window_size_days: 365

output:
  primary_key: ["ts_code", "ann_date", "end_date"]
  sort_by: ["ann_date", "end_date"]
  columns:
    ts_code: {type: string, required: true}
    ann_date: {type: date, format: "%Y%m%d"}
    f_ann_date: {type: date, format: "%Y%m%d"}
    end_date: {type: date, format: "%Y%m%d", required: true}
    report_type: {type: string}
    comp_type: {type: string}
    end_type: {type: string}
    total_share: {type: float}
    cap_rese: {type: float}
    undistr_porfit: {type: float}
    surplus_rese: {type: float}
    special_rese: {type: float}

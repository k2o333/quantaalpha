api_name: stock_company
derived_fields:
  setup_date_dt:
    description: 日期类型的setup_date
    format: '%Y%m%d'
    source: setup_date
    type: date
description: 上市公司基本信息
name: stock_company

# Fields配置：显式指定所有返回字段（包括默认和非默认字段）
fields:
  - ts_code           # TS代码
  - com_name          # 公司全称
  - com_id            # 统一社会信用代码
  - exchange          # 交易所代码
  - chairman          # 董事长
  - manager           # 总经理
  - secretary         # 董秘
  - reg_capital       # 注册资本
  - setup_date        # 成立日期
  - province          # 所在省份
  - city              # 所在城市
  - introduction      # 公司简介
  - website           # 公司主页
  - email             # 邮箱
  - office            # 办公地址
  - employees         # 员工人数
  - main_business     # 主要业务及产品
  - business_scope    # 经营范围

output:
  primary_key:
  - ts_code
  - com_name
  - com_id
  - exchange
  - chairman
  - manager
  - secretary
  - reg_capital
  - setup_date
  - province
  - city
  - introduction
  - website
  - email
  - office
  - employees
  - main_business
  - business_scope
  sort_by:
  - ts_code
pagination:
  default_limit: 7000
  enabled: true
  limit_key: limit
  mode: offset
parameters:
  exchange:
    description: 交易所代码 SSE上交所 SZSE深交所 BSE北交所
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 120
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

api_name: express_vip

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS股票代码
  - ann_date          # 公告日期
  - end_date          # 报告期
  - revenue           # 营业收入（万元）
  - operate_profit     # 营业利润（万元）
  - total_profit      # 利润总额（万元）
  - n_income          # 净利润（万元）
  - total_assets      # 总资产（万元）

derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 业绩快报(VIP) - 按季度获取全部上市公司数据
name: express_vip
output:
  primary_key:
  - ts_code
  - ann_date
  - end_date
  - revenue
  - operate_profit
  - total_profit
  - n_income
  - total_assets
  sort_by:
  - ann_date
pagination:
  enabled: true
  mode: period_range
  periods_per_batch: 1  # 每次下载的 period 数量，默认为 1
parameters:
  ts_code:
    description: 股票代码(可选，不填则获取全部股票)
    required: false
    type: string
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 公告开始日期 YYYYMMDD
    required: false
    type: string
  end_date:
    description: 公告结束日期 YYYYMMDD
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

name: moneyflow_dc
api_name: moneyflow_dc
description: "个股资金流向（东财）"

permissions:
  min_points: 5000
  rate_limit: 60
  query_limit: 6000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "股票代码"
  trade_date:
    type: string
    required: false
    description: "交易日期 YYYYMMDD"
  start_date:
    type: string
    required: false
    description: "开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "结束日期 YYYYMMDD"

pagination:
  enabled: true
  mode: "date_range"
  window_size_days: 365

output:
  primary_key: ["ts_code", "trade_date"]
  sort_by: ["trade_date"]
  columns:
    trade_date: {type: date, format: "%Y%m%d", required: true}
    ts_code: {type: string, required: true}
    name: {type: string, required: true}
    pct_change: {type: float}
    close: {type: float}
    net_amount: {type: float}
    net_amount_rate: {type: float}
    buy_elg_amount: {type: float}
    buy_elg_amount_rate: {type: float}
    buy_lg_amount: {type: float}
    buy_lg_amount_rate: {type: float}
    buy_md_amount: {type: float}
    buy_md_amount_rate: {type: float}
    buy_sm_amount: {type: float}
    buy_sm_amount_rate: {type: float}
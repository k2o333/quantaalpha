api_name: moneyflow_mkt_dc

# Fields 配置：显式指定所有返回字段
fields:
  - trade_date            # 交易日期
  - close_sh              # 上证收盘价（点）
  - pct_change_sh         # 上证涨跌幅 (%)
  - close_sz              # 深证收盘价（点）
  - pct_change_sz         # 深证涨跌幅 (%)
  - net_amount            # 今日主力净流入 净额（元）
  - net_amount_rate       # 今日主力净流入净占比%
  - buy_elg_amount        # 今日超大单净流入 净额（元）
  - buy_elg_amount_rate   # 今日超大单净流入 净占比%
  - buy_lg_amount         # 今日大单净流入 净额（元）
  - buy_lg_amount_rate    # 今日大单净流入 净占比%
  - buy_md_amount         # 今日中单净流入 净额（元）
  - buy_md_amount_rate    # 今日中单净流入 净占比%
  - buy_sm_amount         # 今日小单净流入 净额（元）
  - buy_sm_amount_rate    # 今日小单净流入 净占比%

derived_fields:
  trade_date_dt:
    description: 日期类型的 trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 大盘资金流向（东财）
name: moneyflow_mkt_dc
output:
  primary_key:
  - trade_date
  - close_sh
  - pct_change_sh
  - close_sz
  - pct_change_sz
  - net_amount
  - net_amount_rate
  - buy_elg_amount
  - buy_elg_amount_rate
  - buy_lg_amount
  - buy_lg_amount_rate
  - buy_md_amount
  - buy_md_amount_rate
  - buy_sm_amount
  - buy_sm_amount_rate
  sort_by:
  - trade_date
pagination:
  enabled: true
  mode: reverse_date_range
  window_size_days: 365
  offset:
    enabled: true
    limit: 6000
    commit_on_success: true   # 原子提交，确保窗口数据完整性
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 3000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

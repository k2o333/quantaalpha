name: moneyflow_mkt_dc
api_name: moneyflow_mkt_dc
description: "大盘资金流向（东财）"

permissions:
  min_points: 5000
  rate_limit: 60
  query_limit: 3000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  trade_date:
    type: string
    required: false
    description: "交易日期 YYYYMMDD"
  start_date:
    type: string
    required: false
    description: "开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "结束日期 YYYYMMDD"

pagination:
  enabled: true
  mode: "date_range"
  window_size_days: 365

output:
  primary_key: ["trade_date"]
  sort_by: ["trade_date"]
  columns:
    trade_date: {type: date, format: "%Y%m%d", required: true}
    close_sh: {type: float}
    pct_change_sh: {type: float}
    close_sz: {type: float}
    pct_change_sz: {type: float}
    net_amount: {type: float}
    net_amount_rate: {type: float}
    buy_elg_amount: {type: float}
    buy_elg_amount_rate: {type: float}
    buy_lg_amount: {type: float}
    buy_lg_amount_rate: {type: float}
    buy_md_amount: {type: float}
    buy_md_amount_rate: {type: float}
    buy_sm_amount: {type: float}
    buy_sm_amount_rate: {type: float}
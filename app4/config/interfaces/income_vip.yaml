api_name: income_vip
derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
  f_ann_date_dt:
    description: 日期类型的f_ann_date
    format: '%Y%m%d'
    source: f_ann_date
    type: date
description: 利润表(VIP) - 按季度获取全部上市公司数据
duplicate_detection:
  enabled: true
  date_column: "end_date"
name: income_vip
output:
  dedup_enabled: true
  primary_key:
  - ts_code
  - ann_date
  - end_date
  - update_flag
  sort_by:
  - ann_date
  - end_date
pagination:
  enabled: true
  mode: period_range
parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  comp_type:
    description: 公司类型
    required: false
    type: string
  end_date:
    description: 报告期结束日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false  # 明确标识为日期范围参数，不是锚定参数
  f_ann_date:
    description: 实际公告日期 YYYYMMDD
    required: false
    type: string
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  report_type:
    description: 报告类型
    required: false
    type: string
  start_date:
    description: 报告期开始日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false  # 明确标识为日期范围参数，不是锚定参数
  ts_code:
    description: 股票代码(可选，不填则获取全部股票)
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 8800
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

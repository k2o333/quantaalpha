name: income_vip
api_name: income_vip
description: "利润表(VIP) - 按季度获取全部上市公司数据"

permissions:
  min_points: 5000
  rate_limit: 60
  query_limit: 8800

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "股票代码(可选，不填则获取全部股票)"
  ann_date:
    type: string
    required: false
    description: "公告日期 YYYYMMDD"
  f_ann_date:
    type: string
    required: false
    description: "实际公告日期 YYYYMMDD"
  start_date:
    type: string
    required: false
    description: "报告期开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "报告期结束日期 YYYYMMDD"
  period:
    type: string
    required: false
    description: "报告期 YYYYMMDD"
  report_type:
    type: string
    required: false
    description: "报告类型"
  comp_type:
    type: string
    required: false
    description: "公司类型"

pagination:
  enabled: true
  mode: "stock_loop"

# 重复数据检测配置
duplicate_detection:
  enabled: true          # 默认为 true
  mode: "set"            # 可选: range, set (默认), exact
  key_column: period     # 检测的主键列

output:
  primary_key: ["ts_code", "ann_date", "end_date"]
  sort_by: ["ann_date", "end_date"]
  columns:
    ts_code: {type: string, required: true}
    ann_date: {type: date, format: "%Y%m%d"}
    f_ann_date: {type: date, format: "%Y%m%d"}
    end_date: {type: date, format: "%Y%m%d", required: true}
    report_type: {type: string}
    comp_type: {type: string}
    basic_eps: {type: float}
    diluted_eps: {type: float}
    total_revenue: {type: float}
    revenue: {type: float}
    int_income: {type: float}
    prem_earned: {type: float}
    comm_income: {type: float}
    n_commis_income: {type: float}
    n_oth_income: {type: float}
    n_oth_b_income: {type: float}
    prem_income: {type: float}
    out_prem: {type: float}
    une_prem_reser: {type: float}
    reins_income: {type: float}
    n_sec_tb_income: {type: float}
    n_sec_uw_income: {type: float}
    n_asset_mg_income: {type: float}
    oth_b_income: {type: float}
    fv_value_chg_gain: {type: float}
    invest_income: {type: float}
    ass_invest_income: {type: float}
    forex_gain: {type: float}
    total_cogs: {type: float}
    oper_cost: {type: float}
    int_exp: {type: float}
    comm_exp: {type: float}
    biz_tax_surchg: {type: float}
    sell_exp: {type: float}
    admin_exp: {type: float}
    fin_exp: {type: float}
    assets_impair_loss: {type: float}
    prem_refund: {type: float}

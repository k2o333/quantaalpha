api_name: pro_bar
description: A股复权行情
derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date（关联trade_cal.cal_date_dt）
    format: '%Y%m%d'
    source: trade_date
    type: date
name: pro_bar
output:
  dedup_enabled: true
  primary_key:
  - ts_code
  - trade_date
  sort_by:
  - trade_date
pagination:
  date_pagination: true
  default_limit: 6000
  enabled: true
  limit_key: limit
  mode: stock_loop
  offset_key: offset
  window_size_days: 5000
parameters:
  adj:
    default: qfq
    description: 复权类型
    options:
    - qfq
    - hfq
    - null
    required: false
    type: string
  asset:
    default: E
    description: 资产类别
    required: false
    type: string
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  factors:
    description: 股票因子（asset='E'有效）支持 tor换手率 vr量比
    options:
    - tor
    - vr
    required: false
    type: list
  freq:
    default: D
    description: 数据频度
    required: false
    type: string
  ma:
    description: 均线
    required: false
    type: list
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 证券代码
    required: false
    type: string
permissions:
  min_points: 0
  query_limit: 6000
  rate_limit: 200
request:
  extra_path: /api/pro_bar
  method: POST
  timeout: 60

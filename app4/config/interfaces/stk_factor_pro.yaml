name: stk_factor_pro
api_name: stk_factor_pro
description: "股票技术因子(专业版)"

permissions:
  min_points: 5000
  rate_limit: 30
  query_limit: 10000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ts_code:
    type: string
    required: false
    description: "股票代码"
  trade_date:
    type: string
    required: false
    description: "交易日期 YYYYMMDD"
  start_date:
    type: string
    required: false
    description: "开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "结束日期 YYYYMMDD"

pagination:
  enabled: true
  mode: "stock_loop"

output:
  primary_key: ["ts_code", "trade_date"]
  sort_by: ["trade_date"]
  columns:
    ts_code: {type: string, required: true}
    trade_date: {type: date, format: "%Y%m%d", required: true}
    open: {type: float}
    open_hfq: {type: float}
    open_qfq: {type: float}
    high: {type: float}
    high_hfq: {type: float}
    high_qfq: {type: float}
    low: {type: float}
    low_hfq: {type: float}
    low_qfq: {type: float}
    close: {type: float}
    close_hfq: {type: float}
    close_qfq: {type: float}
    pre_close: {type: float}
    change: {type: float}
    pct_chg: {type: float}
    vol: {type: float}
    amount: {type: float}
    turnover_rate: {type: float}
    turnover_rate_f: {type: float}
    volume_ratio: {type: float}
    pe: {type: float}
    pe_ttm: {type: float}
    pb: {type: float}
    ps: {type: float}
    ps_ttm: {type: float}
    dv_ratio: {type: float}

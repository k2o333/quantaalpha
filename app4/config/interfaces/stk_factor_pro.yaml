api_name: stk_factor_pro
derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date
    format: '%Y%m%d'
    source: trade_date
    type: date
description: 股票技术因子(专业版)
name: stk_factor_pro
output:
  primary_key:
  - ts_code
  - trade_date
  sort_by:
  - trade_date
pagination:
  enabled: true
  mode: stock_loop
  window_size_days: 9999  # 每个股票请求10年数据
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false  # 明确标识为日期范围参数，不是锚定参数
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: false  # 明确标识为日期范围参数，不是锚定参数
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 10000
  rate_limit: 30
request:
  extra_path: ''
  method: POST
  timeout: 30

# 字段定义 - 修复类型推断错误（与 API 实际返回的字段完全匹配）

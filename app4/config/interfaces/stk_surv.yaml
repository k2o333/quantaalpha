api_name: stk_surv

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS代码
  - name              # 股票名称
  - surv_date         # 调研日期
  - fund_visitors     # 基金参与人数
  - recv_etf_num      # 接待ETF数量
  - recvinst_num      # 接待机构数量
  - recvtotal_num     # 接待总人数

derived_fields:
  surv_date_dt:
    description: 日期类型的surv_date
    format: '%Y%m%d'
    source: surv_date
    type: date
description: 机构调研表
name: stk_surv
output:
  primary_key:
  - ts_code
  - surv_date
  - name
  - fund_visitors
  - recv_etf_num
  - recvinst_num
  - recvtotal_num
  sort_by:
  - surv_date
pagination:
  enabled: true
  mode: reverse_date_range
  window_size_days: 365
  empty_threshold_days: 90
  offset:
    enabled: true
    limit: 400  # 每次请求最多 5000 条记录，避免 API 6400 条限制导致数据截断  

parameters:
  end_date:
    description: 调研结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 调研开始日期 YYYYMMDD
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 100
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

api_name: stk_surv
derived_fields:
  surv_date_dt:
    description: 日期类型的surv_date
    format: '%Y%m%d'
    source: surv_date
    type: date
description: 机构调研表
name: stk_surv
output:
  primary_key:
  - ts_code
  - surv_date
  - fund_visitors
  sort_by:
  - surv_date
pagination:
  date_field: trade_date
  enabled: true
  mode: date_range
  window_size_days: 365
parameters:
  end_date:
    description: 调研结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 调研开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 调研日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 5000
  query_limit: 100
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

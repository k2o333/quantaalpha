api_name: dividend
derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 分红送股
name: dividend
output:
  primary_key:
  - ts_code
  - end_date
  - ann_date
  - div_proc
  sort_by:
  - ann_date
pagination:
  enabled: true
  mode: stock_loop
  window_size_days: 3650  # 每个股票请求10年数据
parameters:
  ann_date:
    description: 公告日 YYYYMMDD
    required: false
    type: string
  ex_date:
    description: 除权除息日 YYYYMMDD
    required: false
    type: string
  imp_ann_date:
    description: 实施公告日 YYYYMMDD
    required: false
    type: string
  record_date:
    description: 股权登记日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: TS代码
    required: false
    type: string
permissions:
  min_points: 2000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

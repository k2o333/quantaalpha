api_name: new_share

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS代码
  - sub_code          # 申购代码
  - name              # 股票名称
  - ipo_date          # 上网发行日期
  - issue_date        # 上市日期
  - amount            # 发行总量（万股）
  - market_amount     # 上网发行总量（万股）
  - price             # 发行价格
  - pe                # 市盈率
  - limit_amount      # 单户申购上限（万股）
  - funds             # 募集资金（亿元）
  - ballot            # 中签率

derived_fields:
  ipo_date_dt:
    description: 日期类型的ipo_date
    format: '%Y%m%d'
    source: ipo_date
    type: date
  issue_date_dt:
    description: 日期类型的issue_date
    format: '%Y%m%d'
    source: issue_date
    type: date
description: IPO新股列表
name: new_share
output:
  primary_key:
  - ts_code
  - sub_code
  - name
  - ipo_date
  - issue_date
  - amount
  - market_amount
  - price
  - pe
  - limit_amount
  - funds
  - ballot
  sort_by:
  - ipo_date
pagination:
  enabled: true
  mode: reverse_date_range
  window_size_days: 365
parameters:
  end_date:
    description: 上网发行结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 上网发行开始日期 YYYYMMDD
    required: false
    type: string
permissions:
  min_points: 120
  query_limit: 2000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

api_name: stk_rewards

# Fields配置：显式指定所有返回字段
fields:
  - ts_code           # TS股票代码
  - ann_date          # 公告日期
  - end_date          # 报告期
  - name              # 姓名
  - title             # 职务
  - reward            # 报酬（万元）
  - hold_vol          # 持股数量（股）

derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 管理层薪酬和持股
name: stk_rewards
output:
  primary_key:
  - ts_code
  - name
  - ann_date
  - end_date
  - title
  - reward
  - hold_vol
  sort_by:
  - ann_date
  - ts_code
pagination:
  enabled: true
  mode: stock_loop
  time_range:
    window: 9999d
parameters:
  end_date:
    description: 报告期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: true
  ts_code:
    description: TS股票代码
    required: true
    type: string
permissions:
  min_points: 2000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30
duplicate_detection:
  enabled: true
  date_column: end_date
  stock_level_detection: true

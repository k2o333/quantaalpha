api_name: stk_rewards
derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 管理层薪酬和持股
name: stk_rewards
output:
  primary_key:
  - ts_code
  - name
  - ann_date
  - end_date
  sort_by:
  - ann_date
  - ts_code
pagination:
  enabled: true
  mode: stock_loop
  window_size_days: 9999  # 每个股票请求10年数据
parameters:
  end_date:
    description: 报告期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: true  # 标识为日期锚定参数
  ts_code:
    description: TS股票代码
    required: true
    type: string
permissions:
  min_points: 2000
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

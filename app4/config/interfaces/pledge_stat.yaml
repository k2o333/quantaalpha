api_name: pledge_stat
derived_fields:
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
description: 股权质押统计数据
name: pledge_stat
output:
  primary_key:
  - ts_code
  - end_date
  sort_by:
  - end_date
  - ts_code
pagination:
  enabled: true
  mode: stock_loop
  window_size_days: 9999  # 每个股票请求10年数据
parameters:
  end_date:
    description: 截止日期 YYYYMMDD
    required: false
    type: string
    is_date_anchor: true  # 标识为日期锚定参数
  ts_code:
    description: 股票代码
    required: false
    type: string
permissions:
  min_points: 500
  query_limit: 1000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

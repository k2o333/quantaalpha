api_name: forecast
derived_fields:
  ann_date_dt:
    description: 日期类型的ann_date
    format: '%Y%m%d'
    source: ann_date
    type: date
  end_date_dt:
    description: 日期类型的end_date
    format: '%Y%m%d'
    source: end_date
    type: date
  first_ann_date_dt:
    description: 日期类型的first_ann_date
    format: '%Y%m%d'
    source: first_ann_date
    type: date
description: 业绩预告 (已禁用，请使用 forecast_vip)
enabled: false
name: forecast
output:
  primary_key:
  - ts_code
  - ann_date
  - end_date
  sort_by:
  - ann_date
pagination:
  date_field: ann_date
  enabled: true
  mode: date_range
  window_size_days: 365
parameters:
  ann_date:
    description: 公告日期 YYYYMMDD
    required: false
    type: string
  end_date:
    description: 公告结束日期 YYYYMMDD
    required: false
    type: string
  period:
    description: 报告期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 公告开始日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 股票代码
    required: false
    type: string
  type:
    description: 预告类型(预增/预减/扭亏/首亏/续亏/续盈/略增/略减)
    required: false
    type: string
permissions:
  min_points: 2000
  note: 此接口已禁用，如需获取全部股票数据，请使用 forecast_vip 接口（需5000积分）
  query_limit: 10000
  rate_limit: 60
request:
  extra_path: ''
  method: POST
  timeout: 30

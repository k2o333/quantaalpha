api_name: daily
description: 日线行情
derived_fields:
  trade_date_dt:
    description: 日期类型的trade_date（关联trade_cal.cal_date_dt）
    format: '%Y%m%d'
    source: trade_date
    type: date
duplicate_detection:
  date_column: trade_date
  enabled: true
  mode: range
  threshold: 0.95
name: daily
output:
  dedup_enabled: true
  primary_key:
  - ts_code
  - trade_date
  sort_by:
  - trade_date
pagination:
  enabled: true
  mode: date_range
  window_size_days: 1
parameters:
  end_date:
    description: 结束日期 YYYYMMDD
    required: false
    type: string
  start_date:
    description: 开始日期 YYYYMMDD
    required: false
    type: string
  trade_date:
    description: 交易日期 YYYYMMDD
    required: false
    type: string
  ts_code:
    description: 证券代码
    required: false
    type: string
permissions:
  min_points: 0
  query_limit: 10000
  rate_limit: 120
request:
  extra_path: ''
  method: POST
  timeout: 30

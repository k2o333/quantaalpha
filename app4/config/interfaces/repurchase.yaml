name: repurchase
api_name: repurchase
description: "股票回购"

permissions:
  min_points: 600
  rate_limit: 60
  query_limit: 2000

request:
  method: POST
  extra_path: ""
  timeout: 30

parameters:
  ann_date:
    type: string
    required: false
    description: "公告日期 YYYYMMDD"
  start_date:
    type: string
    required: false
    description: "公告开始日期 YYYYMMDD"
  end_date:
    type: string
    required: false
    description: "公告结束日期 YYYYMMDD"

pagination:
  enabled: true
  mode: "date_range"
  window_size_days: 365

output:
  primary_key: ["ts_code", "ann_date"]
  sort_by: ["ann_date"]
  columns:
    ts_code: {type: string, required: true}
    ann_date: {type: date, format: "%Y%m%d", required: true}
    end_date: {type: date, format: "%Y%m%d"}
    proc: {type: string}
    exp_date: {type: date, format: "%Y%m%d"}
    vol: {type: float}
    amount: {type: float}
    high_limit: {type: float}
    low_limit: {type: float}
# ============================================================
# QuantaAlpha run configuration
# All experiment parameters are consolidated here
# ============================================================

# ============================================================
# PLANNING CONFIGURATION
# Controls parallel exploration direction generation
# ============================================================
planning:
  # Enable "parallel planning": expand initial direction into N exploration directions
  enabled: true
  # Number of parallel directions generated by planning
  num_directions: 2
  # Max retries for planning when LLM output does not match JSON format
  max_attempts: 5
  # Use LLM to generate directions: true=call LLM; false=fallback only
  use_llm: true
  # Allow fallback when LLM fails: true=use built-in direction templates
  allow_fallback: true
  # Planning prompts file path (relative to qlib_rd_loop directory)
  prompt_file: planning_prompts.yaml


# ============================================================
# EXECUTION CONFIGURATION
# Controls main loop execution parameters
# ============================================================
execution:
  # Max loop iterations; multiplied by steps_per_loop to get step_n when step_n not set
  max_loops: 2
  # Steps per loop: fixed at 5 (propose/construct/calculate/backtest/feedback)
  steps_per_loop: 5
  # Total steps (highest priority); overrides max_loops * steps_per_loop when set
  step_n: null
  # Use local environment for backtest: true=local, false=Docker
  use_local: true
  # Run branches in parallel using multiprocessing
  parallel_execution: false
  # Branch log root; used only when parallel planning enabled with >1 branches
  branch_log_root: log
  # Branch log prefix; log directory name format is {prefix}_{index}
  branch_log_prefix: branch


# ============================================================
# EVOLUTION CONFIGURATION
# Controls evolutionary exploration (mutation and crossover)
# Flow: Original → Mutation → Crossover → Mutation → Crossover → ...
# ============================================================
evolution:
  # Enable evolution mode; overrides traditional planning + parallel execution when enabled
  enabled: true

  # Enable mutation phase; when false, skip mutation rounds (original and crossover only)
  mutation_enabled: true

  # Enable crossover phase; when false, skip crossover rounds (original and mutation only)
  crossover_enabled: true

  # Max evolution rounds (including original, mutation, crossover)
  # Flow: both enabled → round 0=original, 1=mutation, 2=crossover, ...
  #       mutation only → round 0=original, 1+=mutation, ...
  #       crossover only → round 0=original, 1+=crossover, ...
  max_rounds: 3

  # Crossover: number of parents selected per crossover operation
  crossover_size: 2
  # Crossover: number of combinations per round (parallelism after crossover)
  crossover_n: 2

  # Parallel execution within each evolution phase
  # true: original round = all n directions in parallel; mutation/crossover rounds = all tasks in parallel
  # false: tasks run sequentially
  parallel_enabled: false

  # Prefer diverse crossover combinations (different directions/phases) vs random parent selection
  prefer_diverse_crossover: true

  # Evolution prompts file path (relative to qlib_rd_loop directory)
  prompt_file: evolution_prompts.yaml

  # Parent selection strategy:
  #   best: prioritize best-performing trajectories
  #   random: random selection
  #   weighted: performance-weighted sampling (higher performance = higher weight)
  #   weighted_inverse: inverse performance-weighted (encourage exploring low performers)
  #   top_percent_plus_random: top 30% guaranteed + random from rest (balance exploitation/exploration)
  parent_selection_strategy: best

  # Top percent threshold (only when parent_selection_strategy = "top_percent_plus_random")
  top_percent_threshold: 0.3

  # Fresh start: true=each experiment starts with empty trajectory pool; false=load existing if available
  fresh_start: true

  # Cleanup on finish: true=delete trajectory pool file after experiment; false=keep for analysis
  cleanup_on_finish: false

  # Mark run as failed when failed task count reaches this threshold; null keeps degraded summary only
  failed_task_threshold: 2

  # H18 adaptive mutation schedule scaffolding. Disabled by default; when enabled,
  # explore weight increases only after at least 3 rounds of stagnation evidence.
  mutation_mode_schedule: fixed
  mutation_mode_weights:
    exploit: 0.75
    explore: 0.25
  adaptive_mutation:
    min_rounds: 3
    stagnation_rounds: 3
    min_active_rate: 0.01
    explore_boost: 0.15
    min_explore_weight: 0.10
    max_explore_weight: 0.60

  # H20 same-round diversity enforcement. Disabled by default.
  diversity_enforcement:
    enabled: false
    similarity_threshold: 0.90
    penalty: 0.10


# ============================================================
# QUALITY GATE CONFIGURATION
# Controls factor quality checks before backtesting
# ============================================================
quality_gate:
  # Consistency check (hypothesis–description–expression). Uses LLM to verify and correct expression if needed
  consistency_enabled: true

  # Complexity check: symbol length, base features count, free args ratio
  complexity_enabled: true

  # Redundancy check: AST-based subtree matching against factor zoo
  redundancy_enabled: true

  # Strict consistency: true=any inconsistency rejects factor; false=only major/critical
  consistency_strict_mode: false

  # Max correction attempts when inconsistency is found
  max_correction_attempts: 3

quality_overlay:
  expression_static:
    lookahead_severity: critical
    anti_pattern_severity: major
  pre_backtest:
    min_valid_ratio: 0.65
    max_nan_ratio: 0.35
    min_unique_values: 20
    min_active_days_ratio: 0.70
    max_constant_day_ratio: 0.20
    max_extreme_zscore_ratio: 0.03
    min_cross_section_coverage: 0.60
  full_backtest:
    cost_rate: 0.001
    monotonicity_groups: 5
    max_turnover: 0.80
    min_cost_adjusted_ir: 0.10
    min_group_monotonicity: 0.60
  oos:
    recent_trading_days: 250
    min_rank_ic_test: 0.00
    min_rank_ic_recent: 0.00
    min_positive_year_ratio: 0.55
  similarity:
    compare_statuses: [active, candidate]
    sample_recent_trading_days: 250
    sample_days_per_month: 5
    max_behavior_rank_corr_median: 0.80
    max_behavior_rank_corr_p90: 0.90
    second_wave:
      dynamic_threshold:
        enabled: false
        formula: "max(min_threshold, base_threshold - alpha * log1p(zoo_size))"
        base_threshold: 0.85
        min_threshold: 0.70
        alpha: 0.02
      ast_canonicalization:
        enabled: false
      time_decay_behavior:
        enabled: false
      consensus_mode:
        enabled: false
      dynamic_oos:
        enabled: false
      interpretability_score:
        enabled: false
  lifecycle:
    use_quality_score: false
    active:
      min_quality_score: 0.70
      min_rank_ic_test: 0.02
    candidate:
      min_quality_score: 0.45
      min_rank_ic_test: 0.00

# ============================================================
# FACTOR GENERATION CONFIGURATION
# Controls factor proposal and expression generation
# ============================================================
factor:
  # Number of factors to generate per hypothesis
  factors_per_hypothesis: 1

  # Complexity constraints (important for preventing overfitting; keep symbol length under ~250)
  complexity:
    symbol_length_threshold: 200
    base_features_threshold: 5
    free_args_ratio_threshold: 0.5

  # Uniqueness/duplication checking against factor zoo
  duplication:
    enabled: true
    threshold: 5
    factor_zoo_path: null  # Use default when null


# ============================================================
# BACKTEST CONFIGURATION
# Controls factor backtesting parameters
# ============================================================
backtest:
  # Backend used by factor mining backtest.
  # Supported: qlib | noqlib | vnpy
  backend: vnpy
  use_docker: false
  timeout: 800
  qlib:
    config_name: conf_baseline.yaml
  noqlib:
    project_root: /home/quan/testdata/aspipe_v4
    app5_storage_root: /home/quan/testdata/aspipe_v4/data
    daily_interface: daily
    # qlib_provider_uri 已移除：不再从 qlib bin 读取任何数据
    # benchmark 使用横截面均值模式，无需指数行情
    benchmark_mode: mean


# ============================================================
# LLM CONFIGURATION
# Controls LLM API behavior
# ============================================================
llm:
  factor_mining_timeout: 999999
  max_retries: 3
  retry_delay: 1.0
  json_mode_strict: true
  # Structured streaming policy: false=non-streaming (default for this rollout)
  structured_streaming_mode: false


# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging:
  level: INFO
  save_snapshots: true
  save_trajectory_pool: true


# ============================================================
# PROMPT FILES CONFIGURATION
# Paths relative to qlib_rd_loop directory
# Factor/hypothesis prompts: quantaalpha/scenarios/qlib/prompts_*.yaml
# ============================================================
prompts:
  planning: planning_prompts.yaml
  evolution: evolution_prompts.yaml


# ============================================================
# DATA CAPABILITY REGISTRY CONFIGURATION
# Controls prompt-time capability injection for factor mining
# ============================================================
data_capability_registry:
  enabled: true
  # Path to the data capability report JSON, relative to configs/ directory
  # Use "../../../data/.data_capability_report.json" for project-level data dir
  report_path: "../../../data/.data_capability_report.json"
  # Minimum date_saturation threshold (0.0-1.0) for interface to be included
  saturation_threshold: 0.5


# ============================================================
# PROVIDER POOL CONFIGURATION (S07)
# Multi-provider LLM routing with key rotation and latency tracking
# ============================================================
provider_pool:
  # Routing strategy: round_robin | random | least_latency
  routing: round_robin

  # Minimum latency samples before least_latency selects a key
  # Prevents premature selection when a key has only 1-2 samples
  min_latency_samples: 3

  # Provider definitions
  # Each provider can have multiple API keys (round-robin across keys)
  providers:
    # Primary OpenAI provider
    - name: openai
      api_keys:
        - "${OPENAI_API_KEY}"  # Populated from environment
      base_url: "https://api.openai.com/v1"
      model: "gpt-4-turbo"
      timeout: 60
      metadata:
        region: us-east
        tier: standard

    # Azure OpenAI (optional)
    # - name: azure_openai
    #   api_keys:
    #     - "${AZURE_OPENAI_KEY}"
    #   base_url: "${AZURE_OPENAI_ENDPOINT}"
    #   model: "gpt-4-turbo"
    #   timeout: 90
    #   metadata:
    #     api_version: "2024-02-01"

    # Anthropic Claude (optional)
    # - name: anthropic
    #   api_keys:
    #     - "${ANTHROPIC_API_KEY}"
    #   base_url: "https://api.anthropic.com"
    #   model: "claude-3-opus-20240229"
    #   timeout: 60
    #   metadata:
    #     tier: standard


# ============================================================
# ENSEMBLE AGGREGATION CONFIGURATION (S07)
# Multi-model factor aggregation strategies
# ============================================================
ensemble:
  # Default aggregation strategy when none specified
  # Options:
  #   intersection  - Conservative: factors appearing in ALL models
  #   union_dedup   - Permissive: all unique factors across models
  #   voting        - Democratic: factors with >= threshold votes
  #   fusion_score  - Weighted: factors scored by model quality weights
  default_strategy: union_dedup

  # Voting strategy configuration
  voting:
    # Minimum votes required for a factor to be included
    # Default: majority (ceil(num_models / 2))
    threshold: null

  # Fusion scoring configuration
  fusion_score:
    # Default quality score for models without explicit scores
    default_quality: 0.5
    # Model quality weights (optional override)
    # Format: {model_name: weight_0_to_1}
    # weights:
    #   gpt-4-turbo: 0.9
    #   claude-3-opus: 0.95
    #   gpt-3.5-turbo: 0.6

  # Strategy-specific options
  strategies:
    # For intersection: require all models to respond
    intersection:
      require_all: true

    # For union_dedup: deduplication method
    union_dedup:
      dedup_method: string  # string | semantic

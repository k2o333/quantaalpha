planning:
  enabled: false
  num_directions: 1
  max_attempts: 5
  use_llm: false
  allow_fallback: true
  prompt_file: planning_prompts.yaml
execution:
  max_loops: 1
  steps_per_loop: 5
  step_n: 4
  use_local: true
  parallel_execution: false
  branch_log_root: log/vnpy_uat
  branch_log_prefix: branch
evolution:
  enabled: false
  mutation_enabled: true
  crossover_enabled: true
  max_rounds: 3
  crossover_size: 2
  crossover_n: 2
  parallel_enabled: false
  prefer_diverse_crossover: true
  prompt_file: evolution_prompts.yaml
  parent_selection_strategy: best
  top_percent_threshold: 0.3
  fresh_start: true
  cleanup_on_finish: false
  failed_task_threshold: 2
quality_gate:
  consistency_enabled: false
  complexity_enabled: true
  redundancy_enabled: false
  consistency_strict_mode: false
  max_correction_attempts: 3
factor:
  factors_per_hypothesis: 1
  complexity:
    symbol_length_threshold: 200
    base_features_threshold: 5
    free_args_ratio_threshold: 0.5
  duplication:
    enabled: true
    threshold: 5
    factor_zoo_path: null
backtest:
  backend: vnpy
  use_docker: false
  timeout: 800
  qlib:
    config_name: conf_baseline.yaml
  noqlib:
    project_root: /home/quan/testdata/aspipe_v4
    app5_storage_root: /home/quan/testdata/aspipe_v4/data
    daily_interface: daily
    qlib_provider_uri: /home/quan/testdata/aspipe_v4/third_party/data/qlib_data_csi300_bin
llm:
  factor_mining_timeout: 999999
  max_retries: 3
  retry_delay: 1.0
  json_mode_strict: true
  structured_streaming_mode: false
logging:
  level: INFO
  save_snapshots: true
  save_trajectory_pool: true
prompts:
  planning: planning_prompts.yaml
  evolution: evolution_prompts.yaml
data_capability_registry:
  enabled: true
  report_path: ../../../data/.data_capability_report.json
  saturation_threshold: 0.5
provider_pool:
  routing: round_robin
  min_latency_samples: 3
  providers:
  - name: openai
    api_keys:
    - ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    model: gpt-4-turbo
    timeout: 60
    metadata:
      region: us-east
      tier: standard
ensemble:
  default_strategy: union_dedup
  voting:
    threshold: null
  fusion_score:
    default_quality: 0.5
  strategies:
    intersection:
      require_all: true
    union_dedup:
      dedup_method: string
